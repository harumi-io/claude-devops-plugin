# Default DevOps plugin configuration
# Override per-repo by placing a .devops.yaml in your repository root

cloud:
  provider: aws                    # aws | gcp | azure
  region: us-east-2
  account_alias: harumi

terraform:
  version: "1.5.7"
  state_backend: s3
  var_file: prod.tfvars

kubernetes:
  tool: kubectl                    # kubectl | oc (openshift)
  gitops: argocd                   # argocd | none
  gitops_repo: ""                  # repo where K8s manifests live (e.g., harumi-k8s)
  app_of_apps: {}                  # root app paths per environment (e.g., prod: eks/bootstrap/eks-app.yaml)
  clusters:
    - name: eks-dev
      context: eks-dev
      environment: development
      domain: ""                   # e.g., dev.harumi.io
      registry: ""                 # e.g., 123456789.dkr.ecr.us-east-2.amazonaws.com
    - name: eks-prod
      context: eks-prod
      environment: production
      domain: ""                   # e.g., harumi.io
      registry: ""                 # e.g., 123456789.dkr.ecr.us-east-2.amazonaws.com
  namespaces: []                   # populated by setup-devops-config scanning cluster
  helm:
    default_chart_repo: ""         # e.g., https://charts.helm.sh/stable

cicd:
  platform: github-actions         # github-actions | gitlab-ci | circleci

observability:
  metrics: prometheus              # prometheus | datadog | cloudwatch
  dashboards: grafana
  logs: loki                       # loki | cloudwatch | datadog
  traces: tempo                    # tempo | jaeger | xray

containers:
  runtime: docker                  # docker | podman | nerdctl
  registry: ecr                    # ecr | gcr | dockerhub | ghcr

naming:
  pattern: "{namespace}-{stage}-{name}"
  namespace: harumi
  stage: production
